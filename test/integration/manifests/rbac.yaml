apiVersion: v1
kind: ServiceAccount
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: metadata-exporter
subjects:
  - kind: ServiceAccount
    name: metadata-exporter
