apiVersion: v1
kind: ServiceAccount
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
---
# Cluster-wide read-only access is required so tests can exercise both
# cluster-wide and per-namespace watch topologies using the same binary.
# The exporter is read-only (no create/update/patch/delete verbs granted).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metadata-exporter-integration
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metadata-exporter-integration
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metadata-exporter-integration
subjects:
  - kind: ServiceAccount
    name: metadata-exporter
    namespace: metadata-exporter-it
