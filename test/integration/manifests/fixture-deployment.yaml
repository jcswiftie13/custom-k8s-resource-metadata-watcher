apiVersion: apps/v1
kind: Deployment
metadata:
  name: fixture-web
  labels:
    app.kubernetes.io/name: fixture-web
    integration-test: "true"
  annotations:
    integration.test/controller-note: "from-fixture-deployment"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fixture-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fixture-web
        integration-test: "true"
    spec:
      containers:
        - name: pause-main
          image: registry.k8s.io/pause:3.9
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
        - name: pause-sidecar
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
