apiVersion: v1
kind: ConfigMap
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
data:
  # Default base config: cluster-wide watch.
  # Go e2e tests rewrite this ConfigMap to switch between topology modes.
  config.yaml: |
    metricPrefix: "it_"

    watch:
      namespaces: []
      kinds:
        Pod:
          fieldSelector: "status.phase!=Succeeded"
        ReplicaSet: {}
        Deployment: {}
        StatefulSet: {}
        DaemonSet: {}

    rules:
      - name: "pod_info"
        help: "Integration test: one series per Pod."
        anchor: Pod
        relations:
          - name: top
            via: topController
        labels:
          namespace:
            path: "metadata.namespace"
          pod:
            path: "metadata.name"
          phase:
            path: "status.phase"
          controller_kind:
            source: top
            path: "kind"
          controller_name:
            source: top
            path: "metadata.name"
        flatten:
          - namePrefix: "controller_annotation_"
            source: top
            path: "metadata.annotations"
            keys:
              - "integration.test/controller-note"

      - name: "pod_container_info"
        help: "Integration test: one series per (Pod, container)."
        anchor: Pod
        forEach: "spec.containers[*]"
        relations:
          - name: top
            via: topController
        labels:
          namespace:
            path: "metadata.namespace"
          pod:
            path: "metadata.name"
          container:
            source: item
            path: "name"
          image:
            source: item
            path: "image"
          controller_name:
            source: top
            path: "metadata.name"
