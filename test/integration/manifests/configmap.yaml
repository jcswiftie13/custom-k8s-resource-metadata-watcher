apiVersion: v1
kind: ConfigMap
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter-integration
data:
  # Default base config: cluster-wide watch.
  # Go e2e tests rewrite this ConfigMap to switch between topology modes.
  config.yaml: |
    metricPrefix: "it_"

    watch:
      resources:
        - kind: Pod
          scope: Namespaced
          fieldSelector: "status.phase!=Succeeded"
        - kind: ReplicaSet
          scope: Namespaced
        - kind: Deployment
          scope: Namespaced
        - kind: StatefulSet
          scope: Namespaced
        - kind: DaemonSet
          scope: Namespaced
        - kind: Node
          scope: Cluster

    rules:
      - name: "pod_info"
        help: "Integration test: one series per Pod."
        anchor: Pod
        relations:
          - name: top
            via: topController
        labels:
          namespace:
            path: "metadata.namespace"
          pod:
            path: "metadata.name"
          phase:
            path: "status.phase"
          controller_kind:
            source: top
            path: "kind"
          controller_name:
            source: top
            path: "metadata.name"
          controller_annotation_integration_test_controller_note:
            source: top
            path: 'metadata.annotations["integration.test/controller-note"]'

      - name: "pod_container_info"
        help: "Integration test: one series per (Pod, container)."
        anchor: Pod
        forEach: "spec.containers[*]"
        relations:
          - name: top
            via: topController
        labels:
          namespace:
            path: "metadata.namespace"
          pod:
            path: "metadata.name"
          container:
            source: item
            path: "name"
          image:
            source: item
            path: "image"
          controller_name:
            source: top
            path: "metadata.name"

      - name: "node_info"
        help: "Integration test: one series per Node."
        anchor: Node
        labels:
          node_name:
            path: "metadata.name"
          system_uuid:
            path: "status.nodeInfo.systemUUID"

      - name: "node_address"
        help: "Integration test: one series per (Node, address)."
        anchor: Node
        forEach: "status.addresses[*]"
        labels:
          node_name:
            path: "metadata.name"
          address_type:
            source: item
            path: "type"
          address:
            source: item
            path: "address"

      - name: "node_condition"
        help: "Integration test: one series per (Node, condition)."
        anchor: Node
        forEach: "status.conditions[*]"
        labels:
          node_name:
            path: "metadata.name"
          condition:
            source: item
            path: "type"
          status:
            source: item
            path: "status"
