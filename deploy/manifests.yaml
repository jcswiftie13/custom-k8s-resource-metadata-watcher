# Kubernetes manifests for metadata-exporter.
# Render: kubectl apply -f deploy/manifests.yaml

apiVersion: v1
kind: Namespace
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metadata-exporter
  namespace: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets", "deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metadata-exporter
subjects:
  - kind: ServiceAccount
    name: metadata-exporter
    namespace: metadata-exporter

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: metadata-exporter
  namespace: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter
data:
  config.yaml: |
    metricPrefix: "custom_"

    # Limit the watch scope to reduce apiserver load. Remove this block to
    # watch the whole cluster (requires cluster-wide RBAC which is already
    # granted by the ClusterRoleBinding above).
    watch:
      resources:
        - kind: Pod
          scope: Namespaced
          # namespaces: ["prod", "staging"]
          # Field selectors are filtered by the apiserver's watch cache
          # before events are emitted, so they reduce load even for chatty
          # clusters. The Pod field-selector whitelist is:
          #   metadata.name, metadata.namespace, spec.nodeName,
          #   spec.restartPolicy, spec.schedulerName, spec.serviceAccountName,
          #   status.phase, status.nominatedNodeName
          fieldSelector: "status.phase!=Succeeded"
        - kind: ReplicaSet
          scope: Namespaced
        - kind: Deployment
          scope: Namespaced
        - kind: StatefulSet
          scope: Namespaced
        - kind: DaemonSet
          scope: Namespaced
        - kind: Node
          scope: Cluster

    rules:
      # Per-pod series (one row per Pod).
      - name: "pod_info"
        help: "One series per Pod."
        anchor: Pod
        labels:
          namespace:
            path: "metadata.namespace"
          pod:
            path: "metadata.name"
          node:
            path: "spec.nodeName"
          phase:
            path: "status.phase"
          controller_kind:
            source: topController
            path: "kind"
          controller_name:
            source: topController
            path: "metadata.name"
          argocd_tracking_id:
            source: topController
            path: 'metadata.annotations["argocd.argoproj.io/tracking-id"]'
            fallbacks:
              - source: anchor
                path: 'metadata.annotations["argocd.argoproj.io/tracking-id"]'

      # Per-(pod, container) series with image metadata.
      - name: "pod_container_info"
        help: "One series per (pod, container)."
        anchor: Pod
        forEach: "spec.containers[*]"
        labels:
          namespace:
            path: "metadata.namespace"
          pod:
            path: "metadata.name"
          container:
            source: item
            path: "name"
          image:
            source: item
            path: "image"
          controller_kind:
            source: topController
            path: "kind"
          controller_name:
            source: topController
            path: "metadata.name"
          argocd_tracking_id:
            source: topController
            path: 'metadata.annotations["argocd.argoproj.io/tracking-id"]'

      # Optional: kube_pod_labels-style flattening of the Pod's metadata.labels
      # into dynamic Prometheus labels. Cardinality control via allow/maxKeys
      # is strongly recommended in production to avoid runaway dimensions.
      # Uncomment and tune to enable.
      #
      # - name: "pod_labels"
      #   help: "Pod labels expanded into dynamic Prometheus labels."
      #   anchor: Pod
      #   labels:
      #     namespace: { path: "metadata.namespace" }
      #     pod:       { path: "metadata.name" }
      #   expandLabels:
      #     - path: "metadata.labels"
      #       prefix: "label_"
      #       maxKeys: 64
      #       # allow: ["app.kubernetes.io/name", "team", "env"]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metadata-exporter
  namespace: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: metadata-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metadata-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: metadata-exporter
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metadata-exporter
          image: ghcr.io/example/metadata-exporter:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/metadata-exporter/config.yaml
            - --metrics-addr=:8080
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/metadata-exporter
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: metadata-exporter

---
apiVersion: v1
kind: Service
metadata:
  name: metadata-exporter
  namespace: metadata-exporter
  labels:
    app.kubernetes.io/name: metadata-exporter
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: metadata-exporter
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
